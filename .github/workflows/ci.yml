name: CI

on:
  push:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: ./mvnw verify

  native:
    name: Native Image (Linux x64)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build native image
        run: ./mvnw -Pnative native:compile -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: coraquest-linux-amd64
          path: target/coraquest-progress-to-bgg
          retention-days: 30

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: native
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: coraquest-linux-amd64
          path: artifact

      - name: Copy binary to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: artifact/coraquest-progress-to-bgg
          target: /opt/coraquest/
          strip_components: 1

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            chmod +x /opt/coraquest/coraquest-progress-to-bgg
            sudo systemctl restart coraquest
